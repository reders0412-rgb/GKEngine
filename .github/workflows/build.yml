name: GK Suite CI/CD

on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:

env:
  GK_VERSION: "1.0"

jobs:
  build:
    name: "Build GK Suite"
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 1. Freetype 설치 (vcpkg 사용)
      - name: Install Dependencies (vcpkg)
        run: vcpkg install freetype:x64-windows

      # 2. GK Engine Core 빌드 (가이드 3번 항목 적용)
      - name: Configure & Build Core
        run: |
          cmake -B build/core GKEngine/Core `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/core --config Release -j4

      # 3. GK Hub 빌드 (경로 명시 추가)
      - name: Configure & Build Hub
        run: |
          cmake -B build/hub GKHub `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/build/core" ` # 이 줄을 추가!
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/hub --config Release -j4

      # 4. GK Engine UI 빌드 (가이드 5번 항목 적용)
      - name: Build Engine UI
        shell: pwsh
        run: |
          # DLL 복사
          Copy-Item build/core/Release/GK_Engine_Core.dll GKEngine/UI/
          # UI 빌드 및 퍼블리시
          dotnet publish GKEngine/UI/GKEngine.UI.csproj `
            -c Release -r win-x64 --self-contained false `
            -o dist/GKEngineUI /p:Version=${{ env.GK_VERSION }}

      # 5. 배포 패키지 조립 (가이드 6번 항목 적용)
      - name: Assemble Package
        shell: pwsh
        run: |
          $pkg = "dist/GKSuite-${{ env.GK_VERSION }}"
          New-Item -Force -ItemType Directory $pkg, "$pkg/Editors/${{ env.GK_VERSION }}"
          Copy-Item build/hub/Release/GK_Hub.exe $pkg/
          if (Test-Path "GKHub/assets") { Copy-Item -Recurse GKHub/assets $pkg/assets }
          Copy-Item -Recurse dist/GKEngineUI/* "$pkg/Editors/${{ env.GK_VERSION }}/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GKSuite-${{ env.GK_VERSION }}-Windows-x64
          path: dist/GKSuite-${{ env.GK_VERSION }}