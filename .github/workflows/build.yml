name: GK Suite CI/CD

on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:

env:
  GK_VERSION: "1.0"   # ★ 버전 변경 시 이것만 (CMakeLists.txt GK_VERSION 과 동일하게)

jobs:
  build:
    name: "Build All (single cmake --build)"
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: deps-

      - name: Configure
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DGK_VERSION="${{ env.GK_VERSION }}" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (Hub + Core DLL + Engine UI 한번에)
        run: cmake --build build --config Release -j4

      - name: Upload dist/
        uses: actions/upload-artifact@v4
        with:
          name: GKSuite-${{ env.GK_VERSION }}-Windows-x64
          path: dist/
          retention-days: 30

      - name: ZIP (main branch only)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: Compress-Archive dist/* "GKSuite-${{ env.GK_VERSION }}-Windows-x64.zip"

      - name: Upload ZIP
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: GKSuite-Release-${{ env.GK_VERSION }}
          path: GKSuite-${{ env.GK_VERSION }}-Windows-x64.zip
          retention-days: 90

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GKSuite-${{ env.GK_VERSION }}-Windows-x64.zip
          name: "GK Suite ${{ env.GK_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
